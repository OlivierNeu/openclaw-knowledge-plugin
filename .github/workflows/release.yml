name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: node --test index.test.js

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create artifact
        run: |
          mkdir -p dist/openclaw-knowledge
          cp package.json openclaw.plugin.json index.js LICENSE dist/openclaw-knowledge/
          cd dist
          tar -czf openclaw-knowledge-${{ steps.version.outputs.VERSION }}.tar.gz openclaw-knowledge/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openclaw-knowledge-${{ steps.version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
