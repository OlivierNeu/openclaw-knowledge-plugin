name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: node --test index.test.js

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version from tag into package files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i 's/"version": *"[^"]*"/"version": "'"$VERSION"'"/' package.json openclaw.plugin.json

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract the section for this version (between ## [x.y.z] headers)
          awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release_notes.md
          # Flag whether we found changelog content
          if [ -s release_notes.md ]; then
            echo "FOUND=true" >> "$GITHUB_OUTPUT"
          else
            echo "FOUND=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install production dependencies (bundled in release)
        run: npm install --omit=dev

      - name: Create artifact
        run: |
          mkdir -p dist/openclaw-knowledge
          cp package.json openclaw.plugin.json index.js LICENSE dist/openclaw-knowledge/
          cp -r node_modules dist/openclaw-knowledge/
          cd dist
          tar -czf openclaw-knowledge-${{ steps.version.outputs.VERSION }}.tar.gz openclaw-knowledge/

      - name: Create GitHub Release (with changelog)
        if: steps.changelog.outputs.FOUND == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openclaw-knowledge-${{ steps.version.outputs.VERSION }}.tar.gz
          body_path: release_notes.md

      - name: Create GitHub Release (auto-generated notes)
        if: steps.changelog.outputs.FOUND == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openclaw-knowledge-${{ steps.version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
